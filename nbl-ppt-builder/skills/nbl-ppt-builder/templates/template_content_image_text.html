<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>正文页 - 图文混排布局</title>
<script src="https://statics.moonshot.cn/kimi-ppt/html-gen/static/tailwindcss@4_0805.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
  }
  .slide-container {
    width: 960px;
    height: 540px;
    position: relative;
    overflow: hidden;
    background: #FFFFFF;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  .card-shadow {
    box-shadow: 0 4px 20px rgba(11, 59, 211, 0.1);
  }
  .image-shadow {
    box-shadow: 0 8px 30px rgba(11, 59, 211, 0.15);
  }
  .image-placeholder {
    background: #E3F2FD;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #0B3BD3;
    font-size: 12pt;
    font-weight: 500;
  }
</style>
</head>
<body class="bg-gray-100 p-8">

<!-- 正文页 slide - 图文混排布局（左图右文） -->
<!-- 如需改为左文右图，交换下方 grid 中图片区和文字区的顺序 -->
<div class="slide-container mx-auto">
  <!-- 背景装饰 -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -bottom-20 -left-20 w-[250px] h-[250px] rounded-full opacity-5 bg-[#1D4FED]"></div>
  </div>

  <!-- 顶部灰色分隔线 -->
  <div class="absolute top-[60px] left-[9px] right-[9px] h-[1.5px] bg-[#797979] opacity-30"></div>

  <!-- LOGO（右上角） -->
  <div class="absolute right-[9px] top-[6px]">
    <img src="images/logo.png" width="83" height="49" alt="LOGO">
  </div>

  <!-- 顶部突出标题栏 -->
  <div class="absolute left-[17px] top-[16px]">
    <h1 class="text-[18pt] font-bold text-[#0B3BD3]">{{顶部突出标题}}</h1>
  </div>

  <!-- 图文混排内容区：左文右图（45:55 比例） -->
  <div class="absolute left-[17px] top-[80px] right-[17px] bottom-[45px] grid grid-cols-[1fr_55%] gap-5">
    <!-- 左侧：文字区 -->
    <div class="bg-white rounded-2xl p-5 pt-6 pr-6 card-shadow flex flex-col border-l-4 border-[#0B3BD3]">
      <h3 class="text-[16pt] font-bold text-[#1a1a2e] mb-2 leading-tight">{{文字区标题}}</h3>
      <div class="w-8 h-0.5 bg-[#0B3BD3] rounded-full mb-4 opacity-80"></div>
      <p class="text-[11pt] leading-relaxed text-[#4a4a5a] mb-5">
        {{文字区正文：详细描述或分析内容，保持段落简洁清晰。}}
      </p>
      <div class="space-y-4">
        <div class="flex items-start gap-3">
          <div class="w-6 h-6 rounded-full bg-[#0B3BD3] flex items-center justify-center flex-shrink-0 mt-0.5">
            <span class="text-white text-[8pt] font-bold">1</span>
          </div>
          <div>
            <p class="text-[11pt] font-bold text-[#1a1a2e] leading-snug">{{要点1标题}}</p>
            <p class="text-[9.5pt] text-[#666] leading-snug mt-0.5">{{要点1描述}}</p>
          </div>
        </div>
        <div class="flex items-start gap-3">
          <div class="w-6 h-6 rounded-full bg-[#1D4FED] flex items-center justify-center flex-shrink-0 mt-0.5">
            <span class="text-white text-[8pt] font-bold">2</span>
          </div>
          <div>
            <p class="text-[11pt] font-bold text-[#1a1a2e] leading-snug">{{要点2标题}}</p>
            <p class="text-[9.5pt] text-[#666] leading-snug mt-0.5">{{要点2描述}}</p>
          </div>
        </div>
        <div class="flex items-start gap-3">
          <div class="w-6 h-6 rounded-full bg-[#7986CB] flex items-center justify-center flex-shrink-0 mt-0.5">
            <span class="text-white text-[8pt] font-bold">3</span>
          </div>
          <div>
            <p class="text-[11pt] font-bold text-[#1a1a2e] leading-snug">{{要点3标题}}</p>
            <p class="text-[9.5pt] text-[#666] leading-snug mt-0.5">{{要点3描述}}</p>
          </div>
        </div>
      </div>
    </div>

    <!-- 右侧：图片区 -->
    <div class="bg-white rounded-2xl overflow-hidden image-shadow border border-gray-100 flex items-center justify-center">
      <img src="{{图片路径}}" alt="{{图片描述}}" class="w-full h-full object-cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      <div class="image-placeholder w-full h-full" style="display: none;">
        <div class="text-center">
          <svg class="w-12 h-12 mx-auto mb-2 opacity-50" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd"></path></svg>
          <p class="text-[10pt]">{{图片路径}}</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 页码 -->
  <div class="absolute right-[15px] bottom-[15px]">
    <span class="text-[9pt] text-[#898989]">{{页码}}</span>
  </div>
</div>

</body>
</html>
