<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>正文页 - 流程步骤布局</title>
<script src="https://statics.moonshot.cn/kimi-ppt/html-gen/static/tailwindcss@4_0805.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
  }
  .slide-container {
    width: 960px;
    height: 540px;
    position: relative;
    overflow: hidden;
    background: #FFFFFF;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  .card-shadow {
    box-shadow: 0 4px 20px rgba(11, 59, 211, 0.1);
  }
  .step-card {
    display: flex;
    align-items: stretch;
    background: white;
    border-radius: 12px;
    overflow: hidden;
  }
  .step-index {
    width: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .step-index span {
    color: white;
    font-size: 14pt;
    font-weight: 900;
  }
  .step-body {
    flex: 1;
    padding: 14px 18px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .step-title {
    font-size: 12pt;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 4px;
    line-height: 1.4;
  }
  .step-desc {
    font-size: 9.5pt;
    color: #666;
    line-height: 1.5;
  }
  .down-arrow {
    width: 0;
    height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 10px solid #c7d2fe;
    margin: 6px 0;
  }
</style>
</head>
<body class="bg-gray-100 p-8">

<!-- 正文页 slide - 纵向流程步骤布局（4 步骤） -->
<div class="slide-container mx-auto">
  <!-- 背景装饰 -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-10 right-10 w-24 h-24 rounded-full opacity-5 bg-[#0B3BD3]"></div>
    <div class="absolute bottom-10 left-10 w-16 h-16 rounded-full opacity-5 bg-[#1D4FED]"></div>
  </div>

  <!-- 顶部灰色分隔线 -->
  <div class="absolute top-[60px] left-[9px] right-[9px] h-[1.5px] bg-[#797979] opacity-30"></div>

  <!-- LOGO（右上角） -->
  <div class="absolute right-[9px] top-[6px]">
    <img src="images/logo.png" width="83" height="49" alt="LOGO">
  </div>

  <!-- 顶部突出标题栏 -->
  <div class="absolute left-[17px] top-[16px]">
    <h1 class="text-[18pt] font-bold text-[#0B3BD3]">{{顶部突出标题}}</h1>
  </div>

  <!-- 页面标题区 -->
  <div class="absolute left-[17px] top-[75px]">
    <div class="flex items-center gap-3">
      <div class="w-1.5 h-8 bg-[#0B3BD3] rounded-full"></div>
      <h2 class="text-[13.5pt] font-bold text-[#202665]">{{页面标题}}</h2>
    </div>
  </div>

  <!-- 纵向流程步骤内容区 -->
  <!--
    步骤数量调整：
    - 3 步骤：删除 step-4 块及其下方的 down-arrow，适当增大卡片内边距
    - 5 步骤：复制一组 step-card + down-arrow，缩小卡片垂直间距
  -->
  <div class="absolute left-[80px] right-[80px] top-[120px] bottom-[45px] flex flex-col items-center">

    <!-- 步骤 1 -->
    <div class="step-card w-full card-shadow">
      <div class="step-index bg-[#0B3BD3]">
        <span>01</span>
      </div>
      <div class="step-body">
        <h3 class="step-title">{{步骤1标题}}</h3>
        <p class="step-desc">{{步骤1描述：简述该步骤的核心动作、输入条件或预期产出。}}</p>
      </div>
    </div>

    <!-- 向下箭头 -->
    <div class="down-arrow"></div>

    <!-- 步骤 2 -->
    <div class="step-card w-full card-shadow">
      <div class="step-index bg-[#1D4FED]">
        <span>02</span>
      </div>
      <div class="step-body">
        <h3 class="step-title">{{步骤2标题}}</h3>
        <p class="step-desc">{{步骤2描述}}</p>
      </div>
    </div>

    <!-- 向下箭头 -->
    <div class="down-arrow"></div>

    <!-- 步骤 3 -->
    <div class="step-card w-full card-shadow">
      <div class="step-index bg-[#0B3BD3]">
        <span>03</span>
      </div>
      <div class="step-body">
        <h3 class="step-title">{{步骤3标题}}</h3>
        <p class="step-desc">{{步骤3描述}}</p>
      </div>
    </div>

    <!-- 向下箭头 -->
    <div class="down-arrow"></div>

    <!-- 步骤 4 -->
    <div class="step-card w-full card-shadow">
      <div class="step-index bg-[#1D4FED]">
        <span>04</span>
      </div>
      <div class="step-body">
        <h3 class="step-title">{{步骤4标题}}</h3>
        <p class="step-desc">{{步骤4描述}}</p>
      </div>
    </div>

  </div>

  <!-- 页码 -->
  <div class="absolute right-[15px] bottom-[15px]">
    <span class="text-[9pt] text-[#898989]">{{页码}}</span>
  </div>
</div>

</body>
</html>
